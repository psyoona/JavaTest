<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 관리 시스템</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="container">
    <h1>📦 주문 관리 시스템</h1>

    <div class="stats">
        전체 주문 수: <span id="totalCount">-</span> 건
        &nbsp;|&nbsp; 조회 방식: <strong>Cursor(Keyset) 기반 페이징</strong>
    </div>

    <div class="info-box">
        💡 <strong>Cursor 기반 페이징</strong>은 <code>WHERE id &gt; cursor ORDER BY id LIMIT size</code> 방식으로
        offset 기반보다 대용량 데이터에서 훨씬 빠른 성능을 제공합니다.
    </div>

    <!-- 검색 폼 -->
    <div class="search-form">
        <div class="form-group">
            <label for="customerName">고객명</label>
            <input type="text" id="customerName" placeholder="고객명 검색...">
        </div>
        <div class="form-group">
            <label for="status">주문 상태</label>
            <select id="status">
                <option value="">전체</option>
                <option value="PENDING">대기</option>
                <option value="CONFIRMED">확인</option>
                <option value="SHIPPED">배송중</option>
                <option value="DELIVERED">배송완료</option>
                <option value="CANCELLED">취소</option>
            </select>
        </div>
        <div class="form-group">
            <label for="size">페이지 크기</label>
            <select id="size">
                <option value="20">20</option>
                <option value="50" selected>50</option>
                <option value="100">100</option>
                <option value="200">200</option>
            </select>
        </div>
        <button id="searchBtn" class="btn btn-primary">검색</button>
        <button id="resetBtn" class="btn btn-secondary">초기화</button>
    </div>

    <!-- 테이블 -->
    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>고객명</th>
                <th>상품명</th>
                <th>수량</th>
                <th>단가</th>
                <th>총액</th>
                <th>상태</th>
                <th>주문일시</th>
            </tr>
            </thead>
            <tbody id="orderBody">
            <tr><td colspan="8" class="loading">불러오는 중...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 페이징 -->
    <div class="paging">
        <button id="firstBtn" class="btn btn-secondary">⏮ 처음</button>
        <span id="rangeInfo"></span>
        <button id="nextBtn" class="btn btn-disabled" data-cursor="">다음 ▶</button>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
