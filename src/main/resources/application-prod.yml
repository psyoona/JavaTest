# ──────────────────────────────────────────────
# 프로덕션 환경 설정
# application.yml의 기본 설정을 이 파일이 덮어씀
# 실행: java -jar demo.jar --spring.profiles.active=prod
# ──────────────────────────────────────────────

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
    username: ${DB_USERNAME:demo_user}
    password: ${DB_PASSWORD}           # 반드시 환경변수로 주입 (하드코딩 금지)
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      auto-commit: false

  jpa:
    hibernate:
      # 최초 배포(테이블 없을 때): update → 앱 시작 후 validate 로 변경하고 서비스 재시작
      ddl-auto: update
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    com.example.demo: INFO
