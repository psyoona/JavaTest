spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/demo}
    username: ${DB_USERNAME:demo_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: update  # 최초 배포 후 validate 로 변경할 것
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: WARN
    com.yoonslab.order: INFO
