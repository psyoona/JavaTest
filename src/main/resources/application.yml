spring:
  application:
    name: java-springboot-demo

  # ──────────────────────────────────────────────
  # PostgreSQL 18 DataSource
  # ──────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/demo
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 20000
      # 대용량 스트리밍 쿼리를 위해 auto-commit false 설정
      auto-commit: false

  # ──────────────────────────────────────────────
  # JPA / Hibernate
  # ──────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        # 대용량 배치 처리 최적화
        jdbc:
          batch_size: 100
          fetch_size: 500
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100
    # 운영 환경에서는 false로 설정 (SQL 구조 노출 방지)
    show-sql: false

# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server:
  port: 8080

# ──────────────────────────────────────────────
# ETW 이벤트 배치 설정
# ──────────────────────────────────────────────
etw:
  batch:
    flush-interval-ms: 5000    # 배치 플러시 주기 (밀리초)
    drain-size: 5000           # 1회 플러시 시 최대 drain 건수

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.yoonslab.order: DEBUG
    # 운영 환경에서는 제거 (SQL 바인딩 값 로그 노출 방지)
    # org.hibernate.SQL: DEBUG
    # org.hibernate.type.descriptor.sql.BasicBinder: TRACE
